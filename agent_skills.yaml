# ==========================================
# КОНФИГУРАЦИЯ AUTO-ASSIGNMENT
# ==========================================

config:
  strategy: "best_fit"  # best_fit, round_robin, least_loaded, performance
  
  # Минимальный скоринг для назначения
  min_score_threshold: 0.5
  
  # Веса для формулы скоринга
  scoring_weights:
    skills_match: 0.40
    specialization_match: 0.25
    performance_score: 0.20
    load_balance: 0.15
  
  # Лимиты
  max_tasks_per_agent: 3
  assignment_timeout_minutes: 30
  
  # Авто-переназначение
  reassign_on_timeout: true
  reassign_on_decline: true
  reassign_on_failure: true

# ==========================================
# СТАТИСТИКА
# ==========================================

statistics:
  total_assignments: 0
  successful_assignments: 0
  declined_assignments: 0
  auto_reassigned: 0
  
  # История назначений
  assignment_history: []
