# review_bot.yaml - Конфигурация Code Review Bot

meta:
  created: "2026-03-12T18:00:00Z"
  version: "1.0.0"
  updated_by: "GLM-5 (Zhipu AI)"

bot:
  name: "Code Review Bot"
  version: "1.0.0"
  primary_model: "Qwen 3.5 (Alibaba Cloud)"
  fallback_models:
    - "GLM-5 (Zhipu AI)"
    - "Claude Opus 4.6 (Anthropic)"
  timeout_seconds: 300
  max_retries: 2

triggers:
  automatic:
    - trigger: "task_completion"
      enabled: true
      condition: "task.status == 'completed'"
    - trigger: "quality_gate_pass"
      enabled: true
      condition: "quality_gate.status == 'passed'"
  manual:
    enabled: true

checks:
  static_analysis:
    enabled: true
    run_in_parallel: true
    tools:
      eslint:
        enabled: true
        config: ".eslintrc.json"
        fail_on: ["error"]
      typescript:
        enabled: true
        strict: true
        fail_on: ["error"]
    severity_actions:
      error: "block"
      warning: "warn"
      info: "info"

  security:
    enabled: true
    fail_fast: true
    checks:
      sql_injection:
        enabled: true
        severity: "critical"
        action: "block"
      xss_vulnerabilities:
        enabled: true
        severity: "critical"
        action: "block"
      hardcoded_secrets:
        enabled: true
        severity: "critical"
        action: "block"
      insecure_dependencies:
        enabled: true
        severity: "high"
        action: "block"

  code_quality:
    enabled: true
    metrics:
      complexity:
        enabled: true
        max_cyclomatic: 15
        action: "warn"
      duplication:
        enabled: true
        max_percentage: 5
        action: "warn"
      function_length:
        enabled: true
        max_lines: 50
        action: "info"

  patterns:
    enabled: true
    naming_conventions:
      enabled: true
      action: "info"
    error_handling:
      enabled: true
      action: "warn"
    async_patterns:
      enabled: true
      action: "warn"

  best_practices:
    enabled: true
    frameworks:
      nextjs:
        enabled: true
        version: "16"
      react:
        enabled: true
      prisma:
        enabled: true
      typescript:
        enabled: true
        strict: true

  # Vision-specific checks
  vision:
    enabled: true
    checks:
      image_handling:
        enabled: true
        check_memory_leaks: true
        action: "warn"
      pattern_recognition:
        enabled: true
        check_accuracy_threshold: true
        min_accuracy: 0.85
        action: "warn"

output:
  format: "markdown"
  include:
    suggestions: true
    examples: true
    code_snippets: true
  limits:
    max_comments: 20
    max_suggestions: 10

statistics:
  total_reviews: 0
  approved: 0
  blocked: 0
  warnings: 0
  issues_by_category:
    security: 0
    quality: 0
    patterns: 0
    best_practices: 0
    vision: 0
  avg_review_time_seconds: 0
  avg_score: 0

reviews:
  history: []
